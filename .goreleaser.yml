version: 2
project_name: llamactl

before:
  hooks:
    - go mod tidy
    # v1.5.3: generate shell completion scripts at release time so the
    # cask can ship them. `go run` against the source rather than the
    # built binary because the build runs after `before.hooks` — the
    # completion command's output doesn't depend on the version stamp,
    # so a dev-built helper produces identical text.
    - mkdir -p completions
    - sh -c "go run ./cmd/llamactl completion bash > completions/llamactl.bash"
    - sh -c "go run ./cmd/llamactl completion zsh  > completions/_llamactl"
    - sh -c "go run ./cmd/llamactl completion fish > completions/llamactl.fish"

builds:
  - id: llamactl
    main: ./cmd/llamactl
    binary: llamactl
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [arm64]
    ldflags:
      - -s -w -X main.llamactlVersion=v{{.Version}}

archives:
  - id: default
    ids:
      - llamactl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README.md
      - completions/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

homebrew_casks:
  - name: llamactl
    binaries:
      - llamactl
    completions:
      bash: completions/llamactl.bash
      zsh: completions/_llamactl
      fish: completions/llamactl.fish
    repository:
      owner: gregmundy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/gregmundy/llamactl"
    description: "Run llama.cpp on Apple Silicon"
    license: "MIT"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", staged_path]
          end
    caveats: |
      Verify your environment after install:

        llamactl doctor

      Add your first model:

        llamactl add qwen2.5-3b-instruct
